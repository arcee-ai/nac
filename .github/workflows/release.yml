name: Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nac

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build nac
        run: cargo build --release -p nac

      - name: Build nacserver
        run: cargo build --release -p nacserver

      - name: Run tests
        run: cargo test --workspace

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy nac binary for image builds
        run: cp target/release/nac images/nac

      - name: Build and push images
        run: |
          for variant in base python; do
            docker build -t ${{ env.IMAGE_PREFIX }}:$variant \
              -f images/Dockerfile.$variant images/
            docker push ${{ env.IMAGE_PREFIX }}:$variant
          done

      - name: Upload nacserver binary
        uses: actions/upload-artifact@v4
        with:
          name: nacserver-linux-x86_64
          path: target/release/nacserver
